name: Publish

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'develop'
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push: v1.2.3 -> 1.2.3 (release version)
            VERSION="${GITHUB_REF_NAME#v}"
            IS_SNAPSHOT="false"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            # Main branch without tag: get latest tag + SNAPSHOT
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION="${LATEST_TAG#v}-SNAPSHOT"
            IS_SNAPSHOT="true"
          else
            # Feature/develop branches: latest tag + branch name + SNAPSHOT
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
            VERSION="${LATEST_TAG#v}-${BRANCH}-SNAPSHOT"
            IS_SNAPSHOT="true"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_snapshot=${IS_SNAPSHOT}" >> "$GITHUB_OUTPUT"
          echo "Publishing version: ${VERSION} (snapshot: ${IS_SNAPSHOT})"

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./gradlew build

      - name: Publish to Central Portal
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
        run: |
          ./gradlew :springdoc-openapi-starter-webmvc-redoc:publishMavenJavaPublicationToCentralPortalRepository
          ./gradlew :springdoc-openapi-starter-webflux-redoc:publishMavenJavaPublicationToCentralPortalRepository

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            springdoc-openapi-starter-webmvc-redoc/build/libs/*.jar
            springdoc-openapi-starter-webflux-redoc/build/libs/*.jar
